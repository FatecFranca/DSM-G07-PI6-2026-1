name: Build e Deploy das APIs PetDex

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🧩 Checkout do repositório
        uses: actions/checkout@v4

      - name: ⚙️ Definir nome da branch
        run: echo "BRANCH_NAME=${GITHUB_REF##*/}" >> $GITHUB_ENV

      - name: 🔑 Login no Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: 🏗️ Build e Push da API Java
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 2
          command: |
            cd api-java
            docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/api-java:${{ env.BRANCH_NAME }} .
            docker push ${{ secrets.DOCKERHUB_USERNAME }}/api-java:${{ env.BRANCH_NAME }}

      - name: 🐍 Build e Push da API Python
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 2
          command: |
            cd api-python
            docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/api-python:${{ env.BRANCH_NAME }} .
            docker push ${{ secrets.DOCKERHUB_USERNAME }}/api-python:${{ env.BRANCH_NAME }}

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 🧩 Checkout do repositório
        uses: actions/checkout@v4

      - name: 📁 Criar diretório de destino na VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: mkdir -p /home/${{ secrets.VM_USER }}/petdex

      - name: 📦 Copiar docker-compose.yml para a VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/home/${{ secrets.VM_USER }}/petdex/"

      - name: 🚀 Executar deploy via Docker Compose
        uses: appleboy/ssh-action@v1.2.0
        env:
          TAG: ${{ github.ref_name }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DATABASE_URI: ${{ secrets.DATABASE_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          BCRYPT_SALT: ${{ secrets.BCRYPT_SALT }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: TAG,DOCKERHUB_USERNAME,DATABASE_URI,JWT_SECRET,BCRYPT_SALT
          script: |
            echo "🚀 Atualizando APIs da PetDex na VM..."

            cd /home/${{ secrets.VM_USER }}/petdex

            docker compose pull
            docker compose up -d --force-recreate

            echo "✅ Deploy concluído com sucesso!"
