spring.application.name=petdex-api
springdoc.swagger-ui.path=/swagger
spring.data.mongodb.uri=${DATABASE_URI}
spring.jackson.time-zone=America/Sao_Paulo

# Security Configuration
jwt.secret=${JWT_SECRET:petdex-secret-key-change-in-production}
bcrypt.salt=${BCRYPT_SALT:10}
server.port=8080

# Logging Configuration
logging.level.com.petdex.api.infrastructure.security=INFO
logging.level.com.petdex.api.application.services.security=INFO

spring.cloud.gcp.project-id=project-bc409a47-e0f3-4761-b4e
spring.cloud.gcp.pubsub.enabled=true
spring.cloud.gcp.credentials.location=${GCP_CREDENTIALS:file:/app/google-cloud-key.json}
