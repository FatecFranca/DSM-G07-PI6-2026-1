# Configurações para Testes (Banco em Memória)
# Deixar a porta em 0 força o uso de uma porta aleatória, evitando conflitos com banco local
spring.data.mongodb.port=0
de.flapdoodle.mongodb.embedded.version=6.0.1

# Excluir segurança e websocket nos testes de repositório para evitar falhas de contexto
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,org.springframework.boot.autoconfigure.websocket.servlet.WebSocketServletAutoConfiguration
